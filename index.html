<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bautismo de Felicitas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      // Silenciar los errores de la extensión MetaMask en la consola
      const originalError = console.error;
      const originalWarn = console.warn;
      const originalLog = console.log;
      
      const filterMetaMask = (originalFunc) => function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].toLowerCase().includes('metamask')) {
          return;
        }
        originalFunc.apply(console, args);
      };

      console.error = filterMetaMask(originalError);
      console.warn = filterMetaMask(originalWarn);
      console.log = filterMetaMask(originalLog);
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && event.reason.message.toLowerCase().includes('metamask')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
